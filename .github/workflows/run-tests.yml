name: run-tests
on:
  workflow_call:
    inputs:
      use-tarballs:
        description: "If true, install via tarball"
        required: false
        type: boolean
        default: false
      tarball-suffix:
        description: "The suffix attached to the name of the code-analyzer tarball"
        required: false
        type: string
        default: "dev"
      target-branch:
        description: "What branch should be checked out?"
        required: false
        type: string
        # If no target branch is specified, just use the one we'd use normally.
        default: ${{ github.sha }}

jobs:
  build-and-run:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: "Check out the code"
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target-branch }}
      - name: "Set up NodeJS"
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*" # Node LTS should always be fine.
      - name: "Install Java v11"
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "11" # Always use Java v11 for running tests.
      - uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: "Install node module dependencies"
        run: npm ci
      # We'll need to install the CLI tool, since some of the tests
      # are integration tests.

      - name: "Compile extension"
        run: npm run build

      - name: Install SF CLI
        run: npm install --global @salesforce/cli
      # We'll need to install Salesforce Code Analyzer, since some
      # of the tests are integration tests.
      # NOTE: SFCA can come from a tarball built in a previous step,
      #       or be installed as the currently-latest version.
      - name: Download Code Analyzer Tarball
        if: ${{ inputs.use-tarballs == true }}
        id: download-tarball
        uses: actions/download-artifact@v4
        with:
          name: tarball-${{ inputs.tarball-suffix }}
          # Download the tarball to a subdirectory of HOME, so it's guaranteed
          # to be somewhere the installation command can see.
          path: ~/downloads/tarball
      - name: Install Code Analyzer Tarball
        if: ${{ inputs.use-tarballs == true }}
        shell: bash
        run: |
          # Determine the tarball's name.
          TARBALL_NAME=$(ls ~/downloads/tarball/code-analyzer | grep salesforce-.*\\.tgz)
          echo $TARBALL_NAME
          # Figure out where the tarball was downloaded to.
          # To allow compatibility with Windows, replace backslashes with forward slashes
          # and rip off a leading `C:` if present.
          DOWNLOAD_PATH=`echo '${{ steps.download-tarball.outputs.download-path }}' | tr '\\' '/'`
          echo $DOWNLOAD_PATH
          DOWNLOAD_PATH=`[[ $DOWNLOAD_PATH = C* ]] && echo $DOWNLOAD_PATH | cut -d':' -f 2 || echo $DOWNLOAD_PATH`
          echo $DOWNLOAD_PATH
          # Pipe in a `y` to simulate agreeing to install an unsigned package. Use a URI of the file's full path.
          echo y | sf plugins install "file://${DOWNLOAD_PATH}/code-analyzer/${TARBALL_NAME}"
      - name: Install Production code-analyzer
        if: ${{ inputs.use-tarballs == false }}
        run: sf plugins install code-analyzer
      # Run the tests. (Linux and non-Linux need slightly different commands.)
      - name: "Run Tests (Linux)"
        run: xvfb-run -a npm run test
        if: runner.os == 'Linux'
      - name: "Run Tests (non-Linux)"
        run: npm run test
        if: runner.os != 'Linux'
      # Print extension E2E log so activation/extension logs are visible in GHA (extension host stdout is not captured).
      # When the Core dependency fails to activate, our extension's activate() never runs, so there is no .sfca-e2e.log;
      # VS Code writes extension-host (and dependency) errors to user-data-dir/logs/ — we print that next.
      - name: "Print extension E2E log"
        if: always()
        shell: bash
        run: |
          E2E_LOG="end-to-end/sampleWorkspace/.sfca-e2e.log"
          ACTIVATION_ERR="end-to-end/sampleWorkspace/.sfca-activation-error.txt"
          echo "##[group]Extension log / activation error (if present)"
          if [ -f "$E2E_LOG" ]; then echo "--- .sfca-e2e.log ---"; cat "$E2E_LOG"; fi
          if [ -f "$ACTIVATION_ERR" ]; then echo "--- .sfca-activation-error.txt ---"; cat "$ACTIVATION_ERR"; fi
          if [ ! -f "$E2E_LOG" ] && [ ! -f "$ACTIVATION_ERR" ]; then echo "(no .sfca-e2e.log — extension activate() did not run; see VS Code extension-host logs below)"; fi
          echo "##[endgroup]"
      # When Core ("Salesforce CLI") fails to activate, VS Code never runs our extension; extension-host logs show why.
      - name: "Print VS Code extension-host logs"
        if: always()
        shell: bash
        run: |
          LOGS_DIR="end-to-end/sampleWorkspace/.vscode-test-user-data/logs"
          echo "##[group]VS Code logs (extension host / dependency activation)"
          if [ -d "$LOGS_DIR" ]; then
            LATEST=$(find "$LOGS_DIR" -maxdepth 1 -type d -name '20*' | sort -r | head -1)
            if [ -n "$LATEST" ]; then
              find "$LATEST" -name '*.log' -type f | sort | while read -r f; do
                echo "--- $f ---"; cat "$f"
              done
            else
              echo "(no timestamped log session under $LOGS_DIR)"
            fi
          else
            echo "(no VS Code logs dir: $LOGS_DIR)"
          fi
          echo "##[endgroup]"
      # Lint, to make sure we're following best practices.
      - name: "Lint"
        run: npm run lint
      # Upload the code coverage from the test as an artifact with
      # the name 'code-coverage-[whatever the OS is]'.
      - name: Upload coverage artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-${{ runner.os }}
          path: ./coverage
